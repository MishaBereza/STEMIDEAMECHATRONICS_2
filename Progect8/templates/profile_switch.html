{% extends 'base.html' %}
{% block content %}
  <h2>Switch Profile by Email</h2>
  <p>Введите email существующего пользователя для переключения профиля.</p>

  <form method="post" action="/profile/switch">
    <label>Email: <input type="email" name="switch_email" required style="width: 300px; padding: 8px;"></label>
    <button type="submit" style="padding: 8px 16px; margin-left: 6px;">Switch</button>
  </form>

  <p style="margin-top: 20px;"><a href="/user/{{ get_current_user().id if get_current_user() else 0 }}">Back to profile</a></p>
{% endblock %}
