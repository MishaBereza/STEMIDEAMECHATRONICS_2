{% extends 'base.html' %}
{% block head %}
  <link rel="stylesheet" href="/static/css/register.css">
{% endblock %}
{% block content %}

  <div class="register-container">

  <h2 class="register-title">
    {{ t('register_user') }}
  </h2>

  <p class="register-description">
    {{ t('fill_form_create_account') }}
  </p>

  <form method="post" class="register-form">

    <!-- FIRST NAME -->
    <label>{{ t('first_name') }} *</label>
    <input type="text" name="first_name" required>

    <!-- LAST NAME -->
    <label>{{ t('last_name') }} *</label>
    <input type="text" name="last_name" required>

    <!-- EMAIL -->
    <label>{{ t('email') }} *</label>
    <input type="email" name="email" required>

    <!-- PHONE -->
    <label>{{ t('phone') }} *</label>
    <input type="tel" name="phone_number" inputmode="tel" required placeholder="+380501112233">

    <!-- PASSWORD -->
    <label>{{ t('password') }} *</label>
    <div style="display: flex; gap: 8px; align-items: center;">
      <input type="password" name="password" id="register-password" required style="margin-bottom: 0;">
      <button type="button" class="password-toggle" data-target="register-password" aria-label="Toggle password visibility">👁</button>
    </div>

    <!-- CONFIRM PASSWORD -->
    <label>{{ t('confirm_password') }} *</label>
    <div style="display: flex; gap: 8px; align-items: center;">
      <input type="password" name="confirm_password" id="register-confirm-password" required style="margin-bottom: 0;">
      <button type="button" class="password-toggle" data-target="register-confirm-password" aria-label="Toggle password visibility">👁</button>
    </div>

    <!-- AGE -->
    <label>{{ t('age') }}</label>
    <input type="number" name="age" min="1" max="150">

    <!-- BIO -->
    <label>{{ t('about_you') }}</label>
    <textarea name="bio" rows="4"></textarea>

    <!-- BUTTONS -->
    <div class="button-group">
      <button type="submit" class="submit-button">
        {{ t('register_btn') }}
      </button>

      <a href="/" class="cancel-button">
        {{ t('back_home') }}
      </a>
    </div>

  </form>

</div>

<script>
  (function () {
    const toggles = document.querySelectorAll('.password-toggle');
    toggles.forEach((toggle) => {
      toggle.addEventListener('click', function () {
        const input = document.getElementById(this.dataset.target);
        if (!input) {
          return;
        }
        const isHidden = input.type === 'password';
        input.type = isHidden ? 'text' : 'password';
        this.textContent = isHidden ? '🙈' : '👁';
      });
    });
  })();
</script>

{% endblock %}
