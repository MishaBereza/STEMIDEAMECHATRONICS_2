{% extends 'base.html' %}
{% block head %}
  <link rel="stylesheet" href="/static/css/register.css">
{% endblock %}
{% block content %}

  <div class="register-container">

  <h2 class="register-title">
    {{ t('register_user') }}
  </h2>

  <p class="register-description">
    {{ t('fill_form_create_account') }}
  </p>

  <form method="post" class="register-form">

    <!-- FIRST NAME -->
    <label>{{ t('first_name') }} *</label>
    <input type="text" name="first_name" required>

    <!-- LAST NAME -->
    <label>{{ t('last_name') }} *</label>
    <input type="text" name="last_name" required>

    <!-- EMAIL -->
    <label>{{ t('email') }} *</label>
    <input type="email" name="email" required>

    <!-- PHONE -->
    <label>{{ t('phone') }} *</label>
    <input type="tel" name="phone_number" inputmode="tel" required placeholder="+380501112233">

    <!-- PASSWORD -->
    <label>{{ t('password') }} *</label>
    <div style="display: flex; gap: 8px; align-items: center;">
      <input type="password" name="password" id="register-password" required style="margin-bottom: 0;">
      <button type="button" class="password-toggle" data-target="register-password" aria-label="Toggle password visibility">👁</button>
    </div>

    <!-- CONFIRM PASSWORD -->
    <label>{{ t('confirm_password') }} *</label>
    <div style="display: flex; gap: 8px; align-items: center;">
      <input type="password" name="confirm_password" id="register-confirm-password" required style="margin-bottom: 0;">
      <button type="button" class="password-toggle" data-target="register-confirm-password" aria-label="Toggle password visibility">👁</button>
    </div>

    <!-- DATE OF BIRTH -->
    <label>Дата народження</label>
    <input type="text" name="date_of_birth" id="date-of-birth" required placeholder="12/02/2008" maxlength="10" pattern="\d{2}/\d{2}/\d{4}">
    <div id="age-display" style="font-size: 14px; color: #555; margin-top: 6px;">Повних років: <span id="age-value">0</span></div>
    <input type="hidden" name="age" id="age-field">

    <!-- BIO -->
    <label>{{ t('about_you') }}</label>
    <textarea name="bio" rows="4"></textarea>

    <!-- BUTTONS -->
    <div class="button-group">
      <button type="submit" class="submit-button">
        {{ t('register_btn') }}
      </button>

      <a href="/" class="cancel-button">
        {{ t('back_home') }}
      </a>
    </div>

  </form>

</div>

<script>
  (function () {
    const toggles = document.querySelectorAll('.password-toggle');
    toggles.forEach((toggle) => {
      toggle.addEventListener('click', function () {
        const input = document.getElementById(this.dataset.target);
        if (!input) {
          return;
        }
        const isHidden = input.type === 'password';
        input.type = isHidden ? 'text' : 'password';
        this.textContent = isHidden ? '🙈' : '👁';
      });
    });
    const dobInput = document.getElementById('date-of-birth');
    const ageValue = document.getElementById('age-value');
    const ageField = document.getElementById('age-field');

    function updateAgeFromDob() {
      let value = dobInput.value.replace(/[^0-9]/g, '');
      if (value.length >= 3 && value.length <= 4 && !value.includes('/')) {
        value = value.slice(0, 2) + '/' + value.slice(2);
      }
      if (value.length >= 5 && !value.slice(2, 3).includes('/')) {
        value = value.slice(0, 2) + '/' + value.slice(2, 4) + '/' + value.slice(4, 8);
      }
      if (value.length > 10) {
        value = value.slice(0, 10);
      }
      dobInput.value = value;

      const parts = value.split('/');
      if (parts.length === 3 && parts[0].length === 2 && parts[1].length === 2 && parts[2].length === 4) {
        const day = parseInt(parts[0], 10);
        const month = parseInt(parts[1], 10);
        const year = parseInt(parts[2], 10);
        const dob = new Date(year, month - 1, day);
        if (!isNaN(dob.getTime()) && dob.getDate() === day && dob.getMonth() === month - 1 && dob.getFullYear() === year) {
          const today = new Date();
          let age = today.getFullYear() - dob.getFullYear();
          if (today.getMonth() < dob.getMonth() || (today.getMonth() === dob.getMonth() && today.getDate() < dob.getDate())) {
            age -= 1;
          }
          if (age < 0) {
            age = 0;
          }
          ageValue.textContent = age;
          ageField.value = age;
          return;
        }
      }
      ageValue.textContent = '0';
      ageField.value = '';
    }

    dobInput.addEventListener('input', updateAgeFromDob);
    dobInput.addEventListener('blur', updateAgeFromDob);  })();
</script>

{% endblock %}
