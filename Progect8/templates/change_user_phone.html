{% extends 'base.html' %}
{% block content %}
  <div class="content-shell">
    <section class="surface-card form-card">
      <h2>{{ t('change_phone_number') }}</h2>
      <form method="post">
        <div class="form-group">
          <label for="current_password">{{ t('current_password') }}</label>
          <input type="password" id="current_password" name="current_password" required>
        </div>
        <div class="form-group">
          <label>{{ t('phone') }}</label>
          <input type="tel" name="phone_number" inputmode="tel" value="{{ current_phone_number }}" required placeholder="+380501112233">
        </div>
        <div class="button-row">
          <button type="submit" class="action-btn success">{{ t('save') }}</button>
          <a href="/user/{{ get_current_user().id if get_current_user() else 0 }}" class="action-btn">{{ t('back_to_profile') }}</a>
        </div>
      </form>
    </section>
  </div>
{% endblock %}
