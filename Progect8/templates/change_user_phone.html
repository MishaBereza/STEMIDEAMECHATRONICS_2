{% extends 'base.html' %}
{% block content %}
  <div class="content-shell">
    <section class="surface-card form-card">
      <h2>{{ t('change_phone_number') }}</h2>
      <form method="post">
        <div class="form-group">
          <label for="current_password">{{ t('current_password') }}</label>
          <input type="password" id="current_password" name="current_password" required>
        </div>
        <div class="form-group">
          <label>{{ t('phone') }}</label>
          <div style="display: flex; gap: 10px; align-items: center;">
            <select name="phone_country_code" style="max-width: 120px;">
              {% for code in phone_country_codes %}
                <option value="{{ code }}" {% if code == default_phone_country_code %}selected{% endif %}>{{ code }}</option>
              {% endfor %}
            </select>
            <input type="tel" name="phone_number" inputmode="numeric" value="{{ current_phone_number }}" required placeholder="{{ t('phone_number') }}">
          </div>
        </div>
        <div class="button-row">
          <button type="submit" class="action-btn success">{{ t('save') }}</button>
          <a href="/user/{{ get_current_user().id if get_current_user() else 0 }}" class="action-btn">{{ t('back_to_profile') }}</a>
        </div>
      </form>
    </section>
  </div>
{% endblock %}
