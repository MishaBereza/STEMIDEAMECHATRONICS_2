{% extends 'base.html' %}
{% block content %}
  <div style="max-width: 520px; margin: 40px auto; background: #fff; border: 2px solid #ffa500; border-radius: 14px; padding: 28px;">
    <h2 style="margin-top:0;">Редагувати профіль</h2>
    <p style="color:#555; margin-bottom:24px;">Змініть своє ім’я, прізвище та вік. Для збереження введіть пароль облікового запису.</p>

    <form method="post" style="display:grid; gap:16px;">
      <div>
        <label style="display:block; margin-bottom:8px; font-weight:600;">Ім’я</label>
        <input type="text" name="first_name" value="{{ user.first_name }}" required style="width:100%; padding:10px; border:1px solid #ccc; border-radius:8px;">
      </div>

      <div>
        <label style="display:block; margin-bottom:8px; font-weight:600;">Прізвище</label>
        <input type="text" name="last_name" value="{{ user.last_name }}" required style="width:100%; padding:10px; border:1px solid #ccc; border-radius:8px;">
      </div>

      <div>
        <label style="display:block; margin-bottom:8px; font-weight:600;">Вік</label>
        <input type="number" name="age" min="1" max="150" value="{{ user.age or '' }}" style="width:100%; padding:10px; border:1px solid #ccc; border-radius:8px;">
      </div>

      <div>
        <label style="display:block; margin-bottom:8px; font-weight:600;">Пароль</label>
        <input type="password" name="current_password" required style="width:100%; padding:10px; border:1px solid #ccc; border-radius:8px;">
      </div>

      <div style="display:flex; gap:12px; flex-wrap:wrap;">
        <button type="submit" style="background:#ffa500; color:#fff; border:none; border-radius:8px; padding:12px 20px; font-weight:700;">Зберегти</button>
        <a href="/user/{{ user.id }}" style="display:inline-flex; align-items:center; justify-content:center; padding:12px 20px; border-radius:8px; border:1px solid #ccc; color:#333; text-decoration:none;">Скасувати</a>
      </div>
    </form>
  </div>
{% endblock %}
