{% extends 'base.html' %}
{% block content %}
  <div class="login-container">
    <h2 class="login-title">{{ t('user_login_title') }}</h2>

    <div class="login-form-container">
      <p class="login-description">{{ t('user_login_description') }}</p>

      <form method="post">
        <label for="email">{{ t('email') }}</label><br>
        <input
          type="email"
          id="email"
          name="email"
          required
          style="width: 100%; padding: 10px; margin-top: 8px; box-sizing: border-box;"
        >
        <label for="password" style="margin-top: 14px;">{{ t('password') }}</label><br>
        <div style="display: flex; gap: 8px; align-items: center;">
          <input
            type="password"
            id="password"
            name="password"
            required
            style="width: 100%; padding: 10px; margin-top: 8px; box-sizing: border-box; margin-bottom: 0;"
          >
          <button type="button" class="password-toggle" data-target="password" aria-label="Toggle password visibility" style="margin-top: 8px;">👁</button>
        </div>
        <button type="submit" class="submit-btn" style="width: 100%; margin-top: 25px;">{{ t('login') }}</button>
      </form>
    </div>
  </div>

  <script>
    (function () {
      const toggle = document.querySelector('.password-toggle');
      if (!toggle) {
        return;
      }
      toggle.addEventListener('click', function () {
        const input = document.getElementById(this.dataset.target);
        if (!input) {
          return;
        }
        const isHidden = input.type === 'password';
        input.type = isHidden ? 'text' : 'password';
        this.textContent = isHidden ? '🙈' : '👁';
      });
    })();
  </script>
{% endblock %}
