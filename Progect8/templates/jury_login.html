{% extends 'base.html' %}
{% block head %}
  <link rel="stylesheet" href="/static/css/admin.css">
{% endblock %}
{% block content %}
  <div class="login-container">
    <h2 class="login-title">🔐 Jury Login</h2>
    
    <div class="login-form-container">
      <p class="login-description">Please enter your email to access the jury panel</p>
      
      <form method="post">
        <div>
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autofocus>
        </div>
        
        <button type="submit" style="width: 100%; margin-top: 25px;">Login</button>
      </form>
    </div>
    
    <p class="back-link"><a href="/">Back to Home</a></p>
  </div>
{% endblock %}
