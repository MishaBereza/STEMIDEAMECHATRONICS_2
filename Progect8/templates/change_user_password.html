{% extends 'base.html' %}
{% block content %}
  <div class="content-shell">
    <section class="surface-card form-card">
      <h2>{{ t('change_user_password') }}</h2>
      <form method="post">
        <div class="form-group">
          <label for="current_password">{{ t('current_password') }}</label>
          <input type="password" id="current_password" name="current_password" required>
        </div>
        <div class="form-group">
          <label for="new_password">{{ t('new_password') }}</label>
          <input type="password" id="new_password" name="new_password" required>
        </div>
        <div class="form-group">
          <label for="confirm_password">{{ t('confirm_password') }}</label>
          <input type="password" id="confirm_password" name="confirm_password" required>
        </div>
        <div class="button-row">
          <button type="submit" class="action-btn success">{{ t('save') }}</button>
          <a href="/user/{{ get_current_user().id if get_current_user() else 0 }}" class="action-btn">{{ t('back_to_profile') }}</a>
        </div>
      </form>
    </section>
  </div>
{% endblock %}
