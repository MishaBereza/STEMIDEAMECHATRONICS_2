{% extends 'base.html' %}
{% block content %}
  <h3>{{ t('register_team') }} {{t_obj.name}}</h3>
  <p style="color:#666;">Only registered users may participate. Enter captain email and member emails (comma separated) – they must match existing users.</p>
  <form method="post">
    <label>{{ t('team_name') }}: <input name="name" required></label><br>
    <label>{{ t('captain_email') }}: <input name="captain_email" type="email" required></label><br>
    <label>{{ t('members') }}: <input name="members"></label><br>
    <button type="submit">{{ t('register_btn') }}</button>
  </form>
{% endblock %}
