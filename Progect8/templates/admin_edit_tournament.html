{% extends 'base.html' %}
{% block head %}
  <link rel="stylesheet" href="/static/css/admin.css">
{% endblock %}
{% block content %}
<div class="admin-page">
  <h2 class="page-title">{{ t('edit') }} {{ t('tournament_page') }}</h2>

  <div class="admin-form-wrapper">
    <form method="post" class="admin-form">
      <div class="form-group">
        <label for="name">{{ t('name') }}</label>
        <input id="name" name="name" value="{{ tournament.name }}" required>
      </div>

      <div class="form-group">
        <label for="description">{{ t('description') }}</label>
        <textarea id="description" name="description" rows="4">{{ tournament.description }}</textarea>
      </div>

      <div class="form-group">
        <label for="max_teams">{{ t('max_teams') }}</label>
        <input type="number" id="max_teams" name="max_teams" value="{{ tournament.max_teams or '' }}">
      </div>

      <div class="form-group">
        <label for="status">{{ t('status') }}</label>
        <select id="status" name="status">
          <option value="Draft" {% if tournament.status == 'Draft' %}selected{% endif %}>{{ t('draft') }}</option>
          <option value="Registration" {% if tournament.status == 'Registration' %}selected{% endif %}>{{ t('registration') }}</option>
          <option value="Running" {% if tournament.status == 'Running' %}selected{% endif %}>{{ t('running') }}</option>
          <option value="Finished" {% if tournament.status == 'Finished' %}selected{% endif %}>{{ t('finished') }}</option>
        </select>
      </div>

      <div class="form-actions">
        <button type="submit" class="submit-btn">{{ t('save') }}</button>
        <a href="/admin/tournaments" class="secondary-btn">{{ t('back_home') }}</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
