{% extends 'base.html' %}
{% block head %}
  <link rel="stylesheet" href="/static/css/admin.css">
{% endblock %}
{% block content %}

<h2 class="page-title">➕ {{ t('create') }} {{ t('tournament_page') }}</h2>

<form method="post" class="admin-form">

  <div class="form-group">
    <label for="name"><b>{{ t('name') }}</b></label>
    <input type="text" id="name" name="name" required>
  </div>

  <div class="form-group">
    <label for="description"><b>{{ t('description') }}</b></label>
    <textarea id="description" name="description" rows="4"></textarea>
  </div>

  <div class="form-group">
    <label for="max_teams"><b>Max Teams</b></label>
    <input type="number" id="max_teams" name="max_teams">
  </div>

  <div class="form-actions">
    <button type="submit" class="submit-btn create-btn">
      🚀 {{ t('create') }}
    </button>
  </div>

</form>

</form>

{% endblock %}
